front:
  text: 年序人身五官中惟耳目為尤重而司聰之外莫若司明目雖開竅屬肝然五臟之精液皆上注於目而為之睛故養生家有內視靜功目光宵燭之説惟內養既充外邪不擾則眸子瞭然常明第人生斯世勞心勞形之事誰能或免或被風霜所冒暑熱所侵則受傷於外或為鬱怒傷肝營血摧耗則受損於內斯則欲因病療治則終身明瞽之關皆出自醫者之手可不慎哉然世所謂能撥雲霧而睹青天者伊何人乎舍清江鄧子其誰與歸豫嘗覺其一草亭目科全書其自序業醫之緣蓋本於宋儒為人子者不可不知醫之論則其人孝矣且以文正范公不為良相即為良醫之旨矢志自期則其人仁矣仁孝之人殫精醫學烏有不造於神明之域者故立論列方內損外因分剖詳悉奇偶制度精專明備且其所傳又迥出尋常萬萬者是以用其方藥輒試輒驗惜乎棗梨殘缺其書不傳豫得是書藏之什襲久矣今不敢自私重付剞劂公之斯世非第為仁人孝子表揚著作之苦心抑亦為天下後世凡苦目病者揀方療治得以復明不須內視之功自可保五官之最重而不慮風霜忿鬱之傷則鄧子一草亭書其功寧有量哉是為序康熙歲次丁酉菊月廣寧年希堯書於金陵官署曹序夫人之有目猶天之有日月也假使天無日月何以判陰陽人而無目何以辨物色故目為司明之官心肝脾肺腎五經皆系焉然則目亦烏可不明耶嗟夫世之病目者多或以酒色而起星障或以風火而生雲翳不有良藥何以療之然良藥非良醫莫能用也余嘗聞蘇子有言藥雖進於醫手方多傳於古人旨哉斯言今業三指禪者不揣醫者意也之義不究病源妄施藥餌轉致瞽廢終身良可慨焉爰思十室之邑必有忠信天下之大豈乏良醫其有能起瞽廢者復遊於光天化日之下厥功亦偉矣哉胡芝樵太守媯川名下士嘗仕吳楚間多惠政逮改官之閩宰沙縣令龍溪深得國僑寬猛之術民情翕然去思來暮所至興歌余同舟十稔矣第知太守之學問淵邃潛心好古其撑腸文字奚啻五千卷而已哉從未知其通岐黃學唯其家人間有疾作未嘗延醫於外竊有疑焉客冬荊人患喘瀕危者屢矣有謂太守能治之遂延至寓投以劑卒賴以安太守其扁鵲後身乎會出示手鈔年偶齋所刊目科為清江鄧氏書後附異傳目科七十二回答合成一册重加校訂名之曰啓蒙真諦藏之有年不欲祕自炫奇亟付鉛槧以公同好乃問序於余余自慚譾陋不諳醫理何敢序是書噫是誠問道於盲也今觀夫是書之有條不紊意義兼賅運用之神非蠡能測洵目科中未見書也余何幸而見之今一展卷間便了然於中竊謂不特啓豫一人之蒙將以啓天下千萬人之蒙也太守以啓蒙真諦而名是書者其誰曰不然光緒八年歲在壬午燈節後一日嘉善曹晉墀謹序於緑榕城西之尺蠖居胡序余讀書之暇好涉獵雜藝自少性已然故岐黃學竊粗曉大義雖習未精然偶審證酌古而運用之治輒驗壯宦湘南同治歲丁卯兒子烈目忽疾雲翳遮睛視字墨者漸色白浸淫乎盲矣余探古方百治卒罔效古人欺我耶抑擇之不精而運用之不神耶或者治目有祕諦古未泄其真將盲而可憫者多矣豈獨餘子哉有友人某者示以抄本目科謂家藏纍世矣特未試其方何如耳余受覽之見其為二册合抄其前册曰一草亭目科全書清江鄧博望先生所撰廣採群方論次精微余固知為盲者之寶筏其後册曰異授眼科其著書人姓名則不傳製藥成方戛戛獨造七十二證治法設為問答探本究源精深顯豁義意美備仙乎隱乎莫可思擬爰為兒子烈揀方治其目不旬日而翳散光明如初余於是乎愈益信是書之果有濟於世始恍然其真諦在此矣遂乃立願製藥施貧盲適以事改官淮忽忽未暇辦此己巳庚午歲奉檄司榷靖江同僚楊君目將廢余為藥之應手復其明乃竟群相驚異於是踵門求醫者無虛日主藥輔藥者是書中之最神妙方也然費頗不資余貧無力製備姑僅修合蘆甘石四分之方應之無不立著效逮余又改官閩一行作吏未嘗舉以告人光緒己卯秋權稅崇安復藥人盲愈者更難以枚舉廣寧年公偶齋官於康熙朝者也嘗惜一草亭簡殘缺為重梓之嘗懼異授世無刊本恐磨滅為創刻之忽忽二百年至今而余所得乃抄本傳寫脫誤亥豕殊多欲證疑似歷求坊間而不得蓋年刻既寡又久遠就湮況復經夫兵燹耶余不揣淺陋逆其意而尋其義略點竄而正之不敢正者注明於逐條之上俾用者酌之諒博望諸賢及後之精岐黃者或不妄我於上下數百年間歟噫今餘年將老矣愧少壯所學所宦皆無大規模垂不朽執是書而濟世一人所及其愈能幾何且殷殷然其久而失傳是慮爰謀之梓續不絶一線又以他得經驗奇方附諸後願舉而示世曰此啓蒙真諦也因以名是書而各仍其舊名判種部付之手民刊而廣布之俾天下盲者不盲盡遊光天化日中而無所患苦是區區所深幸經驗奇方者雖小品僅二然余已百試輒效其功用大矣閲者毋少而忽之光緒八年歲次壬午孟春月媯川胡嵩芝樵氏序張序昌黎韓子曰莫為之前雖美而弗彰莫為之後雖盛而弗傳旨哉斯言千載上下賴繼續不然前之人苦心積慮而有所成者後之人漠而視其殄滅澌盡不承往古以開示來茲幾何不胥天下而盲哉是故抱殘守缺之君子尤於絶學三致其意焉良有以也史遷著書成其自序則曰藏之名山傳諸其人嗟乎其人豈易得哉媯川胡公芝樵者好學而慕古博藝而多能惟博藝也故惜藝如命惟慕古也故懼古就湮所學所能余望其洋而莫測其涯涘矣今特於其校刊啓蒙真諦也蠡舉一勺願與天下共測之啓蒙真諦者媯川總括兩家目科名之也其一清江鄧博望先生著有一草亭目科全書原簡殘缺其一不知何許人著有異授眼科留於天壤間有掃云之巧有撥霧之奇康熙朝年公希堯舉鄧書而重刊又異授而創刻之今遍求之不能得其本惜哉惜哉其學絶矣哉余賦性疏狂不甘牖下處好遊也久矣交士大夫亦多矣所過而見者錦繡之華麗珍寶之充盈光怪陸離駭耀俗耳目則往往皆是然余視之蔑如也兩目直若盲夫余不盲於目而若盲於目則知彼不盲目而實不特盲目且盲於心矣悲哉悲哉是誰使之胥世之寡識者而竟盲之哉光緒庚辰春餘下龍眠入於閩一見輒相得者則有胡媯川而已戾止其廳事名書畫數幅陳設寥寥渾朴而近古揖坐而談之狀貌盎岸而言皆有物退而折矣謂是可以啓余之盲矣居無何不知媯川於何所取余款而館之家命幼子受經焉日月逾邁寒暑已兩嬗至今初余之至館也不意心目間蔑視於彼而忽駭耀於此矣何為其然也登其堂書而已入其齋書而已憩其舍書而已琅函山架牙籤叢積其視錦繡珍寶則倍蓰其光怪陸離矣觀止矣其蔑以加矣逮余館居久乃愈識媯川邃於經熟於史錯綜諸子百家言尤深岐黃學尤非特此也尤有可異者星象也指奕棋堪輿也捕龍虎陽宅也按羲索卜筮也懸龜鑑而六壬尤精風鑑也具隻眼而妍媸而善惡而邪正而吉凶者俱呈露而莫能遁其形神峰則舉天下窮通壽夭歸指掌之間兵法則嘗試之矣殺賊於湖湘升平之世無所用媯川固祕而絶口不談凡此者固又媯川之錦繡媯川之珍寶光怪陸離於其胸腹中者也豈特岐黃之學哉岐黃洋海一𤸈耳是故今者所校刊拳拳然殷殷然惟古絶學於我乎是續為快噫吁嘻博望諸賢既絶而復續於自今以後也苟非賴有好學慕古博藝多能之媯川將何所於傳得其人哉假使是書僅落他人手其漠不知寶惜者委置於櫥架若非蠹蝕而鼠齧即將上漏下濕糜爛不堪付之故簏投之水火耳誰復過而問哉其知之為寶也者則又深藏而祕之獨得以居奇私持其術射利於天下療天下之盲以盲天下之耳目使群驚為空前絶後奇特技是更博其名而其究也亦同歸於盡然則藏之名山傳諸其人者之兩等人夫豈其人哉今媯川惜之至懼之深惜其藝之將絶而又懼古之就湮舉而刊之以廣布天下傳矣博望諸賢不僅當年一時之盛矣後之人苟有精其藝而擅用之美者舉皆啓蒙真諦是宗矣執藝以成名名藝必具彰彰矣嗟乎媯川一人耳上往古下來茲為之後而為之前真欲持是以不盲天下天下安得而測之嗟乎嗟乎余性疏且狂願大召告天下曰盲者可不盲其不盲者勿自抵於盲當保其目如保其心也可光緒八年歲次壬午孟春上浣皖桐張壽六拙我氏序姚序一草亭異授眼科各一卷康熙時為廣寧年偶齋先生希堯所刻歷年既久原書罕見其流傳者率系鈔本近經申報館以活板排印出書有限而無板不能續刷購書稍後者即不可得書中各方歷經遵仿施治頗著奇效屢思付梓以廣其傳庚子冬避兵旋里晤表舅父許君鼎翁談次與有同心爰仿股份票例共為勸募集資重刊是書成不特病瞽者有復睹天日之歡而是書藉以流傳凡靠是者得所依據以神而明之馴致於上壽所全豈淺鮮哉是為序光緒二十七年歲次辛丑仲春上浣嘉興姚寶炘伯純甫謹序
