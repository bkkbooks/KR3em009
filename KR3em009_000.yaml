body:
  text: 目論經曰五臟六腑之精華皆上注於目骨之精為瞳子屬腎筋之精為黑珠屬肝血之精為絡屬心氣之精為白珠屬肺肉之精為約束屬脾血氣之精脈所繫上屬於腦後出於項苟被六淫外感七情內傷飲食失節勞役過度皆能損目夫目通肝竅腎藏其精一有怫鬱則相火挾肝木而上行遂致轉變多端有七十二症之名總不越內外二障而已華元化云目類丸形瞳神居中而前如日月之麗東南而晦西北也有神膏神水神光真血真氣真精此滋目之源液也神膏者目內涵膏神衰則有損神水者由三焦而發源先天真一之氣所化目上潤澤之水也水衰則有火勝燥暴之患水竭則有目輪大小之疾耗澀則有昏眇之危虧者多盈者少是以世無全精之目神光者原於命門通於膽發於心火之用事也火衰則有昏瞑之患火炎則有焚燥之殃夫心君主也通於大眥故大眥赤者實火也命門為小心小心相火也代君行令通於小眥故小眥赤者虛火也若君主拱默則相火自然清寧矣真血者即肝中升運滋目注絡之血也此血非比肌肉間易行之血即天一所生水故謂之真也真氣者即目之經絡中往來生運之氣乃先天真一發生之元陽也真精者乃先後二天元氣所化之精汁起於腎施於膽而後及瞳神也凡此數者一有所損目則病矣無閭子曰夫目者先天之氣所生後天之氣所成陰陽之妙蘊水火之精華血養水水養膏膏護瞳神氣為運用神即維持喻以日月理實同之人身至寶所當重也目議黑珠屬肝肝為木也東方屬木木生風在臟為肝應目中暴怒不常生內郁更因風熱翳侵瞳其症因惱怒不常勞役過度外感風寒內傷色欲以致頭目眩暈視物不明日久不治遂成昏暗等症大小眥屬心心為火也心居包絡名君主血逐火奔眼內凝眥頭大小分虛實遠視還同是火星其症因憂愁煩勞悲苦思慮內傷於心外攻於目赤筋灌瞳胬肉攀睛日久不治漸至失明等症上下胞屬脾脾為土也太陽屬土主脾元積熱相干病有源上下胞瞼腫又赤挑針時發蒂依存其症因多食熱物炙煿辛酸壅熱在內瘀血腫痛粟沙隱澀日久不治以致爛弦倒睫纏綿不已等症白珠屬肺肺為金也肺臟停留心熱攻雙睛微見絳紗籠但宣腸胃辛涼劑方解昏昏似火紅其症因凌霜冒雪飢飽失常風邪外受內熱上攻日久不治以致視物不明變成白膜遮睛疼痛難開衝風出淚等症瞳人屬腎腎為水也又通膽竅此水木有相生之義肝腎有同治之方腎膽同源精自華陰虛火旺便生花上衝神水還成緑急養化源不用嗟其症因嗜欲無厭房勞過度大驚傷神大恐傷志水火既虧陰陽漸損冷淚流於臉上飛花越於目前緑水灌瞳青盲內障等症外障暴發時眼疼痛難開時眼傳染羞明怕日白珠生瘡粟沙隱澀瞼腫胞爛拳毛倒睫胬肉扳睛赤筋貫瞳翳膜遮睛垂簾翳障衝風出淚漏睛膿出傷寒流毒烏珠下陷烏珠突出偷針時發胞肉生膠風牽喎斜雀目凝睛撞破生翳血灌瞳神飛塵傷目時發有根瞼硬腫脹瞳神脹痛時發疸澀小眥赤澀大眥赤澀冰輪翳梅花翳旋螺翳浮翳實翳濕翳干翳釘頭翳白翳紅翳青翳黃翳黑翳時發時散翳裡急外弛跌撲損傷外障治法世謂眼病屬火然非外受風邪眼必不病因腠理為風邪所束內火不得外泄挾肝木而上奔眼竅血隨火行故患赤眼及時調治自獲全愈倘日久不治及治而無效為粗工所誤遂成外障等症外障者風凝熱積血滯也法當除風散熱活血明目須用加減金液湯主之外點玉華丹自愈如患翳膜遮睛者用仙傳紫金膏點之此膏能開瞽或武當人龍此君亦妙金液湯治外障等症軟前胡一錢白桔梗八分直防風一錢川獨活三分京芍藥一錢肥知母五分荊芥穗五分蘇薄荷六分蔓荊子七分炒研北柴胡一錢炒片黃芩五分炒咀片水煎熱服如受風寒重者初二劑加羌活五分小川芎二分白芷梢二分後服仍去如淚多者加北細辛二分家園菊五分如腫脹者加葶藶子三分如痛甚者加厚黃柏三分如紅甚者加連翹三分桑白皮四分牡丹皮六分紅花三分如翳膜者加木賊四分白蒺藜八分如翳障胬肉者加石決明一錢煅如昏懵者加密蒙花八分家白菊五分如大眥紅者加梔仁七分炒黑如小眥紅者加酸棗仁一錢炒遠志肉甘草煎水浸軟去骨炒一錢麥冬一錢去心家白菊三分生地黃一錢當歸尾三分熟地黃一錢如初發赤眼服藥六七劑可愈目無後患外點藥如屢發者風邪積熱入在經絡遇寒即發服金液湯十餘劑後或作散或作丸服調理三十四日外用玉華丹日點一次即愈如體虛者須用加減地黃丸空心服飯後用金液散此法最妙如服金液湯須飯後熱服每日止服一劑不可驟進恐傷胃氣服至六七日自愈如外障等症多是有餘不可妄投補劑恐助邪為害不淺如內熱甚者大便閉結兼以體旺年少之人加大黃一二錢通後除去此病北京最多湯用五龍五龍湯治暴赤腫痛如北地體旺者宜服陳麻黃荊芥穗白桔梗牛蒡子莊大黃咀片各一錢三分作一劑生薑五錢蔥頭二兩為引服後腫消紅退仍用金液湯三四劑外點玉華丹玉華丹治眼患外障紅腫羞澀昏懵翳膜等症蘆甘石二兩取白而輕者如雲片及羊腦髓樣川黃連一兩去蘆切碎水一盅浸半日隔湯煮汁童便一盅取男半歲無病者同連汁和作一碗將甘石置傾銀罐內炭火煅成碧色取起以連汁童便淬之如此煅淬七次加硃砂三錢同研為末水飛去腳候乾又研極細如塵收貯聽用名曰丹頭另制珍珠將珠錢許置豆腐內碗盛蒸一時久研極細收貯聽用丹頭一錢加珠末一分旋研冰片三分和勻入瓷罐封固凡一切外障眼以銀簪或象牙簪沾藥點兩眥內閉一飯久仍以簪撥出藥屑每日早飯後點一次或夜點亦可仙傳紫金膏真黃丹五兩研細水飛候乾用厚綿紙盛鍋內炒熟取起地上候冷又炒又冷如此九次去盡鉛氣又研如塵聽用川黃連去蘆淨二兩切碎石燕一雌一雄大者如檳榔與石蟹等分搗末水飛聽用石蟹不拘一個二個與石燕雌雄等分搗末水飛訶子十二個真熊膽三錢或五錢多則效速試法塵撒水面取粟許滴水上其塵分開方真此眼藥神品冬白蜜濾淨八兩先將連訶用井水三碗煎至一碗半以蟹燕為細末水飛過調和藥汁同蜜銀鍋慢火煎三五沸後入丹再煎取柳條或桃槐條不住手順攪用水一盆在旁如沸起即抬鍋放水盆內待藥有絲為度入熊膽再旋百餘旋勿令雞犬生人婦人見之此方專治男婦一切眼疾雙目不見十餘年者竟能還明但用兩蛤許每日點五七九次不用雙點初點七日停三五日又點七日用燈草搌其翳膜眼自明矣如重者不過三七日神效七寶膏去諸翳障珍珠三錢琥珀三錢水晶三錢龍齒一錢石決明三錢熊膽三錢龍腦旋加五分上搗碎研細水五升砂鍋內煎至一升去粗用銀鍋熬至一盞入淨白蜜五錢和為膏每夜臥後點之旦不可點武當祕授仙方武當山上一仙方泄漏天機不可當巴豆蕤仁和制石硇砂龍骨白丁香不論遠年翳膜障管教一點便開光制石二錢巴豆一錢去殼蕤仁一錢二味同煎水去渣以水入制石內候乾聽用硇砂用田螺一個漂二日泥淨開口時以硇砂三四分入內候其化水以銀銚煎乾收貯每用二釐龍骨火煅為極細末二分白丁香取兩頭尖者端午取用甘草湯浸一宿曬乾研細收貯旋加少許點翳膜胬肉人龍散治紅腫翳膜人龍一條取壯大色白者以線系首尾入長流水洗淨將瓷尖破開滴白漿入制石內點目亦效一去胬肉用杏仁百粒搗爛取汁調製硇砂點或又用白丁香亦可此君丹治翳淡竹殼不拘多少用布拭去毛燒灰存性每藥一錢加麝香三五釐同擂細末點在翳上亦妙凡治外障眼切不可用刀針鉤割恐傷眼血後成痼疾不可治療經曰眼得血而能視則血何可損也但用金液玉華等方自愈一凡飛絲入眼用鹽一粒在口噙化其絲自出或用香草子一粒入眼其子在眼走動搌絲撥出自愈一凡嘴眼歪斜服去風藥數劑脈平又服溫補外用鱔魚血磨白芨塗面一邊立見其貌端正矣劉禹錫方治一切患眼用黃連末蕤仁去皮研以上各等分棗二枚開頭少許去核以藥填滿仍將棗頭合上綿裹用銀鍋煎水一碗至小半濾起待冷洗眼立效棗用大而端正者嗅鼻碧雲散治一切外障等症如開鍋蓋法常使邪毒不閉令有出路然力少而鋭嗅之隨效宜常嗅以聚其力鵝不食草二錢青黛一錢川芎一錢上研為細末先噙水滿口每用如米許嗅入鼻內以淚出為度內障緑水灌瞳蠅影飛越瞳神闊大抱輪紅瞳神焦小亡血過多昏暗瞳神返背能遠視不能近視瞳神缺陷能近視不能遠視瞳神破損婦人胎風瞳神空散倒經血出坐起生花小兒痘翳青盲翳障小兒疳傷冷淚時出黑霧蔽空眩暈轉睛雀目夜發烏風時發不能久視內障治法內障受病多因瞳神不紅不腫人不經意日久不治便成痼疾瞳神屬腎又通膽腑人身最靈者惟此瞳神而人身最重者惟此腎經所謂乙癸同源之義也夫人有陰虛者有陽虛者陰虛則水不滋木少火挾肝木而上炎肝通眼竅眼斯病矣蓋腎經如太極圖也水火具焉右腎屬陽水左腎屬陰水命門少火居中少火者陽也以一陽陷於二陰之中成乎坎之象故易謂天一生水也水火和平百骸通暢然脾土非少火不生肝木非腎水不養脾氣足自生肺金肝氣充自培心火則腎為五臟之源所謂先天真氣生身立命正在此也故無水者壯水之主以鎮陽光無火者益火之源以消陰翳非獨治目諸症可例推矣此水火乃無形之水火即先天真陰真陽也陰虛補陰陽虛補陽脈候參之庶幾勿失若水火有虧瞳神受疾遂為內障等症內障者血少神勞腎虛也法當養血補陰安神明目須用加減地黃丸主之空心服兼進五寶丹飯後服自獲奇效或千金磁朱丹與石斛夜光丸連服及後方選用六味地黃丸壯水之主左尺微弱補水以配火懷地黃酒洗蒸曬九次又酒煮爛搗膏八兩懷山藥四兩炒山萸肉去核四兩洗蒸慢火炒白茯苓去皮屑淨蒸過曬乾三兩牡丹皮去骨三兩光澤瀉去毛三兩俱為末同地黃膏搗勻加煉蜜為丸如梧子大每日空心用滾水吞三錢即以美膳壓下直至腎經且無泥膈之事加當歸五味生地黃柴胡名益陰腎氣丸等分加枸杞白菊八味地黃丸益火之源右尺火衰補火以固本六味加製附子一兩肉桂一兩愚以附桂性烈用還少丹代之尤妙還少丹滋補腎水溫養少火諸虛百損男婦咸宜久服卻病延年懷地黃四兩酒潤蒸曬九次竹刀切片酒煮搗膏甘枸杞四兩人乳蒸二次乘熱同地黃搗肉蓯蓉二兩酒洗去浮甲蒸過同地黃搗川巴戟酒浸去骨曬乾二兩炒研川續斷二兩酒炒川牛膝二兩酒炒川杜仲二兩薑汁炒斷絲山萸肉去核淨二兩酒洗蒸過曬乾炒遠志肉水洗去骨曬乾二兩炒石菖蒲用小而節密者去毛二兩炒楮實子揀淨二兩炒小茴香二兩炒白茯苓去皮木屑水淘淨蒸過曬乾二兩懷山藥二兩蒸炒各制就和勻用棗肉二百枚搗和加煉蜜為丸如梧子大每日早晚滾湯好酒任服任吞五七十丸此丸久服健筋骨利關竅充精血美顏色有大滋益養生至寶昔仙密授婦人服之果得高壽且如童顏因子不服鬚髮皓然筋骨痿軟時當怒責一官遙見拘問女何打父婦曰是吾子也不服吾藥故打之取方歎賞名打老兒丸原系孫真人自龍宮得來凡腎經補藥俱可漸加加味逍遙散治鬱怒傷肝眼目赤澀昏暗婦人多有之血虛發熱口乾自汗月經不調腹痛等症大當歸酒洗一錢白芍藥酒炒一錢白茯神去皮一錢白朮土炒一錢北柴胡炒一錢牡丹皮一錢蘇薄荷三分甘草三分川黃連三分用吳茱萸煎湯拌炒上咀片水煎古方有梔仁趙氏恐其傷胃氣故去之歸脾湯治思慮傷脾不能攝血或健忘怔忡驚悸盜汗寤而不寐或心脾作痛嗜臥少食大便不調或肢體重痛月經不調赤白帶下等症人參一錢白朮一錢茯神一錢棗仁一錢遠志一錢歸身一錢黃耆一錢木香三分甘草三分上咀片水煎龍眼肉三個為引心藏神而主血肝藏魂而藏血脾藏意而統血若思慮俱傷而血不歸經故有前症治以此方使氣血和暢補肝實脾血之散於外者悉歸中州而聽太陰所攝矣天王補心丹治心血不足神志不寧津液枯竭健忘怔忡大便不利口舌生瘡等症人參去蘆一兩元參炒一兩丹參炒一兩天冬去心一兩麥冬去心一兩五味子蜜浸蒸如生用亦可二兩柏子仁炒二兩酸棗仁炒二兩遠志肉甘草煎水浸一宿炒二兩白茯神去皮木二兩歸身酒洗烘二兩白桔梗炒五錢生地黃酒洗薑汁炒二兩研忌鐵器上為末煉蜜為丸如椒目大白滾湯吞服三錢臥時服五寶丹主開瞽復明瞳神缺者能圓陷者能起突者能平真至寶也夜明沙水洗極淨曬乾醋炒晚蠶砂揀去土子極淨醋炒鳳凰退殼內白衣洗淨微火焙乾如焦者不用老母鴨肝水泡切片新瓦焙乾忌鐵器嫩雄雞肝制如前各為極細末各等分和勻每日早晚用酒調服三錢服至七日見效如重者再服一料自愈千金磁朱丹治神水寬大漸散昏如霧中行漸睹空中黑花又漸睹物成二體久則光不收及內障神水淡緑色淡白色者磁石吸針者二兩辰砂一兩神麯四兩共三味先以磁石置巨火中煅醋淬七次曬乾另研極細水飛候乾二兩辰砂另研極細水飛候乾一兩生神麯末三兩與前藥和勻更以神麯末一兩水和作餅煮浮為度摻入前藥內煉蜜為丸如梧子大每服二十丸加至三十丸飯湯送下空心服上方以磁石辛酸寒鎮墜腎經為君令神水不外移也辰砂微甘寒鎮墜心經為臣肝其母此子能令母實也肝實則目明神麯辛溫甘化脾胃中宿食為佐生用者發其生氣熟用者斂其暴氣也服藥後俯視不見仰視漸睹星月者此其效也亦治心火乘金水衰反制之病久病屢發者服之則永不更作空心服午前更以石斛夜光丸主之石斛夜光丸治症上同天門冬去心焙二兩揀人參二兩菟絲子酒煮制研七錢五分五味子炒五錢麥門冬去心焙一兩杏子仁泡去皮尖七錢五分白茯苓去皮二兩枸杞子七錢五分川牛膝七錢五分生地黃一兩熟地黃一兩家白菊七錢五分白蒺藜五錢金石斛五錢肉蓯蓉五錢酒洗去浮甲真川芎五錢中甘草五錢炒陳枳殼去穰麵炒五錢懷山藥七錢五分青葙子五錢炒直防風五錢川黃連五錢炒草決明七錢五分羚羊角鎊末五錢烏犀角鎊五錢上二十五味制末煉蜜為丸如梧子大每服三五十丸溫鹽湯任下上方滋補藥也補上治下利以緩利以久不利以速也故君以天冬人參菟絲之通腎安神強陰填精也臣以五味麥冬杏仁茯苓枸杞牛膝地黃之斂氣除濕涼血補血也佐以菊花蒺藜石斛蓯蓉川芎甘草枳殼山藥青葙之療風治虛益氣祛毒也使以防風黃連草明羚羊烏犀之散滯瀉熱解結明目也陰弱不能配陽之病並宜服之此從則順之治法也熊膽丸觀音治眼方載藏經一人患目翳障遮睛諸醫不效自念惟佛可救於是禮佛甚謹夜夢皂衣人告曰汝要目明當服熊膽丸俱在藏經後依方修制服之旬日目明眸子瞭然即治人目疾多愈真熊膽一分川黃連一兩五錢密蒙花一兩五錢防風一兩五錢川羌活一兩五錢龍膽草一兩地骨皮一兩蛇蛻一兩木賊草一兩仙靈脾一兩旋覆花五錢瞿麥五錢白菊花五錢麒麟竭一錢蔓荊子一合蕤仁三錢五分俱為細末以羯羊肝一具煮其半焙乾入藥取其半生者去筋膜研爛入藥杵而丸之梧子大飯後米飲下三十丸諸品修制唯木賊去節蕤仁用肉蔓荊子水淘蛇蛻炙云烏龍丸呂仙翁治眼方一人性喜雲水見必邀款小閣供奉純陽像奉事甚謹一日有客方巾布袍入語曰汝目昏多淚當服烏龍丸可愈於是依方治藥服之月餘目復明矣夜能視物年至九旬耳目聰明精神如壯生地黃熟地黃惟出懷慶者佳川花椒出四川閉口者勿用三味各等分為末煉蜜為丸如梧子大空心鹽米湯吞五十丸竟可常服報恩丸一官治罪囚出活之後囚因病死矣官患目疾為內障所苦喪明年餘適夜半獨坐嘆息聞階下窸窣之聲官問為誰答曰是昔蒙活囚今來報恩乃告一方川黃連一兩白羊肝一具去筋膜忌鐵器以連末和肝於沙盆內研令極細丸如梧子大每服以滾水下三十丸連作五劑言訖忽不見於是修服數日復明矣凡目疾皆可治忌豬肉冷水雄雞孝感丸一人父歿奉母周遊四方事母盡孝淳熙中寓秦州因患赤眼食蟹遂成內障諸醫無效素解暗誦般若經出丐市裡所得錢持歸母凡歷五載忽夜夢一僧長眉大鼻托一鉢鉢中有水令掬以洗眼復告之曰汝此去當服羊肝丸也意其為佛拜乞其方僧遂以授之夜明砂洗淨當歸灑洗木賊去節蟬蛻去足各一兩共研為末用黑羊肝四兩水煮爛搗如泥入藥拌和又搗丸如梧子大食後滾水下五十丸服之百日復明與其母還鄉母亡棄家遂入道矣後竟仙去三奇丸治內障等症熟地黃九制麥門冬去心車前子去殼各等分為末煉蜜為丸如梧子大食前服用滾水下五十丸一子丹葛仙翁治赤眼翳膜等症大訶子一枚以蜜磨點目中二百花草膏蜂採百花羊食百草用羯羊膽灌入好蜜攪勻線繫縛蒸過懸風處候乾入瓶點目一人患目服黃柏知母之類更加便血何也曰此脾虛不能統血肝虛不能藏血也當用補中益氣湯吞六味地黃丸果愈補中益氣湯治勞倦傷脾中氣不足等症黃耆一錢五分蜜炙人參去蘆一錢甘草一錢炙歸身酒洗一錢白朮土炒一錢陳皮去白五分升麻三分柴胡三分上咀片薑棗水煎服一富家子忽病視正物皆以為斜凡物必更移令斜自以為正其父求醫一醫留其子盛設暢飲至醉乃扶坐轎中使人抬之高下其手常令傾側展轉久之方令登榻而臥達旦酒醒遺之歸家前日斜視之物皆理正矣父母躍然而喜往謝問方何神效如此也醫曰令郎無病是醉中常閃倒肝一葉搭於肺上不能下故視正為斜今夏飲之醉則肺脹展轉之間肝亦隨下矣藥安能治之哉一孕婦忽然視物不明目昏作痛此因胎熱傷肝毒氣上衝或外傷內熱內食炙煿性熱之物以菊連湯主之或金液湯治之無不效也菊連湯治婦人胎風眼防風一錢荊芥穗五分家白菊五分蟬蛻五分連翹六分枯黃芩七分炒川黃連酒炒三分梔仁炒黑六分牛蒡子炒研五分大當歸酒洗八分真川芎五分白芍酒炒八分懷地黃生用一錢上咀片生薑一片燈心一丸為引熱服一乳婦因悸而病既愈目張不得瞑醫曰煮郁李酒飲之使醉即愈所以然者目絲內連肝膽恐則氣結膽衝不下郁李能去結隨酒入膽結去膽下目能明矣以一醉飲主之一醉飲郁李仁泡去皮三錢酒一瓶煮熟飲之果驗一婦人年四十餘兩目昏昧咳嗽頭痛粗工罔效一醫診脈皆細弱脾部尤近弦弱曰脾虛也東垣云五臟六腑皆稟受脾土上貫於目脾虛則五臟精氣皆失所司不能歸明於目矣邪逢其身之虛隨眼絲入於腦則腦鳴而痛心者君火也宜靜相火代行其令勞役運動則妄行侮其所勝故咳嗽也不理脾養血而以苦寒治眼是謂治標不治本也症脈既詳方從意立醫者意也因取曰如意飲如意飲人參一錢五分黃耆一錢五分麥冬去心一錢貝母一錢歸身八分陳皮五分川芎五分黃芩四分家菊五分麥芽四分甘草三分上煎服二劑前症悉除一婦人患爛弦風眼用覆盆子葉旋採以手揉碎入口中咀嚼而留汁滓於小竹筒內聽用取皂紗矇眼用筆畫雙眸於紗上然後滴藥汁漬眼下弦轉盼間蟲出紗外以數十計其狀如絲色赤而長復用前法滴上弦又得蟲數十兼服消風清熱活血之劑遂獲全愈矣覆盆葉能去眼弦爛蟲覆盆子能治目暗不見物冷淚浸淫及青盲等症覆盆子草多取曬乾用時搗令極爛薄綿裹之以人乳浸之如人行八里九里用以點目中即仰面而臥不過三四日視物如童但忌酒面油蓋治目妙品也一人患赤目腫痛脾胃虛弱飲食難進診其脈肝盛脾弱如服涼藥以治肝則損脾飲食愈難進服暖藥以益脾則肝愈盛而加病何以治之乃於溫平藥中倍加肉桂不得用茶常啜恐傷脾也蓋肉桂殺肝而益脾故一治兩得之傳曰木得桂而稿也一人久患目盲有白翳遮睛服藥罔效蓋此眼緣熱藥過多乃生外障視物不明彼皆以為肝損腎虛補其肝腎則眼愈盲治以救苦丹一月目明救苦丹公豬膽一個微火用銀銚內煎成膏候冷入冰片末二三釐點入眼中漸覺翳輕又將豬膽白膜皮曬乾合作小繩如叉火燒灰存性點翳甚者亦能治之小兒痘毒眼治法痘毒入眼有赤腫而痛不能開者有翳障遮蔽而不能視者自古方書所論乃俗説所傳皆以為痘瘡入眼而不知此非有形之瘡乃無形之毒也其遮睛之翳有似痘瘡而實非也蓋有形之瘡發於咽喉者有之發於口舌者有之然皆外瘡起脹時內瘡亦盛外瘡收靨時內瘡亦消惟痘眼之毒必作於收靨之時或還元之後與咽喉口舌之痘迥異此以知其非有形之瘡也蓋眼者五臟氣血之精華也痘毒之鬱滯於肌膚者為癰為癤而其留滯於精華者則發於眼患者毒已留於氣血精華之分則其受病也深故患此者當乘時調治收功於數十劑之後切不可鹵莽草率責效於數劑之間何也痘後之人元氣已弱受毒又深而其毒火發露在表又在至高之位若驟用寒涼峻攻其里而疏利其下則既傷其元氣又拂逆其病勢未有不至於喪明者且或生他症而為大患者多矣須用清毒撥翳湯從容調治使其毒氣漸退而元氣不損此方不失一之術也切戒熏洗若日久不治亦致失明患此症甚多彼不知治法又何怪乎清毒撥翳湯防風五分荊芥穗四分蘇薄荷四分前胡七分蔓荊子四分京芍藥六分桔梗五分北柴胡七分片黃芩五分炒連翹四分肥知母五分炒牛蒡子五分炒研白菊三分密蒙花四分白蒺藜七分去刺木賊三分牡丹皮四分水煎熱服如紅甚加紅花三分桑白皮四分蜜水炒如翳膜遮睛加石決明八分煅研如多淚加北細辛三分如內熱甚加黃連三分炒如甚者可兼用後數方紫龍丹治小兒痘毒眼外用吹耳黃丹五分真輕粉五分俱為末研勻如左眼患吹右耳右眼患吹左耳每日吹二次每用釐許密蒙花散治症前同密蒙花酒洗曬乾五錢蟬蛻去足土五錢穀精草五錢望月沙洗淨曬乾即兔糞一兩俱為末每用獖豬肝一兩以竹刀披開將藥一錢和在內用碗盛蒸熟服亦效穀精草散治症同前穀精草一兩生蛤粉二兩俱為極細末每用獖豬肝一兩去淨筋膜以竹刀切片和藥一錢蒸熟服效以上二方用母雞肝亦可小兒疳積眼治法小兒腸胃柔脆早不可飢晚不可飽衣服隨時自不生病因飲食失宜過飢過飽食後便睡日晚加餐寒熱不調外感或少內傷實多元氣阻滯漸致虛弱遂難運化釀而成疳又貪飲食肌肉愈瘦腸脹下利日久不治疳蟲傷肝目則病矣或閉或翳而變生諸症從而夭折可不悲哉醫不及時治非良法尚不覺久則喪明須用祕授玉龍丹主之玉龍丹治小兒疳積傷眼真雄黃為末水飛候乾三錢寒水石煅為末九錢上二味和勻每日用雞肝一具竹刀切片去淨筋膜膽同藥一錢入酒一盞碗盛蒸食五日見效竟能開瞽治小兒雀目法世傳雀目者何也曰每至日晚二目不見又號雞盲眼經謂眼得血而能視肝血有虧熱入血室故也血主陰晚夜屬陰以類相從治不得法亦能為害須用照月飲主之或決明夜靈散更妙照月飲治雀目立效真雄黃為末水飛候乾用生雞剖取熱肝擂極爛和黃五釐溫酒調服決明夜靈散治雀目大人亦有此症並治石決明洗煅為末夜明沙洗淨為末公豬肝每用一兩羊肝更妙以竹刀切開肝作二片將藥各二錢鋪在肝上合定用線縛之入沙罐內米泔水煮熟臨睡時連肝藥汁俱服附刻薛氏選方明目地黃丸治男婦肝腎俱虛風邪所乘熱氣上攻目翳遮睛羞澀多淚牛膝酒浸三兩石斛四兩枳殼四兩炒杏仁去皮尖四兩防風四兩生地黃一斤熟地黃一斤上為末煉蜜為丸如梧子大每服三五十丸食前鹽湯下按此方可治內外二障但體虛者及年老者甚宜加減駐景丸治肝腎氣虛兩目昏暗視物不明熟地黃八兩當歸五兩川椒一兩楮實一兩菟絲子八兩五味二兩枸杞三兩車前五兩各制末蜜丸梧子大每服三五十丸食前溫酒下按此方治內障滋養神水目自明矣地芝丸治目能遠視不能近視漸至近亦昏蒙生地黃焙乾四兩天門冬去心四兩枳殼二兩炒甘菊花二兩上為末蜜丸梧子大茶清送下百丸按陰虛不能近視此方補陰藥也故主之定志丸治目能近視不能遠視者白茯苓三兩人參三兩遠志肉二兩石菖蒲二兩上為末蜜丸如梧子大以硃砂為衣每服七丸至二三十丸溫米湯下食後服日三服按陽乏不能遠視此方補陽藥也故主之但此症年老宜之空心當服還少丹及補腎陽之藥菊睛丸治肝腎不足眼目昏暗常見黑花多淚枸杞子四兩肉蓯蓉一兩巴戟天一兩甘菊花四兩上為末蜜丸如梧子大每服五十丸鹽湯溫酒任服按此方專補命門少火此水中之火不足蓋水滋肝木肝通眼竅是以神水足而神膏養神光自發瞳神可保無恙矣明目何疑可加熟地八兩五秀重明丸治翳膜遮睛隱澀昏花常服清利頭目甘菊開頭五百朵荊芥穗五百穗木賊去節五百莖川花椒五百粒楮實子五百粒為末蜜丸彈子大每服一丸細嚼徐徐咽下按此方俱輕清上行之品治標可也宜暫用之瑞竹四神丸治腎經虛損眼目昏花甘枸杞一斤取色赤滋潤者作四分用酒一杯潤之一分川椒一兩同炒一分小茴一兩同炒一分芝麻一合同炒一分獨炒炒過將椒等篩揀去加熟地黃四兩白茯苓三兩甘菊花二兩共為末蜜丸如梧子大每服五七十丸空心溫酒送下按此方中年以後每日常服不獨可保目明而卻病廣嗣其功甚大天麻丸治小兒肝風眼疳青黛一錢黃連一錢天麻一錢川芎一錢蘆薈一錢五靈脂一錢夜明沙炒一錢龍膽草一錢五分嫩防風一錢五分蟬蛻一錢五分全蠍少許麝香少許乾蟾頭二錢炙焦俱為末公豬膽汁浸糕丸如麻子大每服十丸薄荷湯下按此方疳傷五臟各有現形唯傷肝者水因風動遂為目患品味周至誠良劑也然余全書在內玉龍丹效甚濟生桑白皮散治肺氣壅塞毒氣上攻眼目白睛腫脹日夜疼痛元參桑白皮枳殼炒杏仁甘菊旋覆花防風京芍黃芩甘草甜葶藶炒柴胡炒上各一兩為細末滾水調一錢飯後服按此方治風熱之劑凡外障睛珠腫脹疼痛宜服密蒙花散治風毒攻目昏暗眵淚並暴赤腫羌活一兩白蒺藜炒一兩木賊一兩密蒙花一兩石決明煅一兩甘菊家園者二兩上為末每服二錢清茶食後調下按此方治風毒凡翳障眼宜服蟬花散治肝經蘊熱毒氣上攻眼目赤腫多淚羞明一切風熱昏翳穀精草一錢甘菊六分蟬蛻五分羌活五分甘草三分蒺藜一錢炒草決明一錢防風七分山梔七分炒川芎三分密蒙花七分木賊五分荊芥穗三分黃芩五分蔓荊子五分炒上為末每服二錢食後茶清調下按蟬花散治外障蘊熱等症固宜但症有不同或新起久患或氣血虛實量人加減詳在全書洗心散治風壅壯熱頭目昏痛熱氣上衝口苦唇焦咽喉腫痛心神煩躁多渴五心煩熱小便赤澀大便祕滯大黃煨六錢甘草六錢當歸六錢芍藥六錢麻黃六錢荊芥六錢白朮五錢上為末每服二三錢生薑薄荷煎服洗肝散治風毒上攻暴作赤目腫痛難開眵淚薄荷當歸羌活防風山梔甘草大黃酒洗川芎上各二兩為末每服二錢食後滾水調下按前二方人多用之故存備參考或問曰洗心洗肝二散治目何如答曰方以洗名克伐可知蓋為體壯氣實者感冒風寒外來腠理內火不得消散實熱上炎奔入眼竅暴赤疼腫大便滯澀姑以此暫用解散否則不敢濫試也人體不同又烏可執泥乎
